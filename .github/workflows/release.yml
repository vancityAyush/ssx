name: sshx Release

on:
  push:
    tags:
      - "sshx-v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.10

      - name: Verify package version matches tag
        if: startsWith(github.ref, 'refs/tags/sshx-v')
        shell: bash
        run: |
          expected="${GITHUB_REF_NAME#sshx-v}"
          actual="$(node -p "require('./package.json').version")"
          test "$expected" = "$actual"

      - name: Install dependencies
        run: bun install

      - name: Build CLI
        run: bun run build

      - name: Create npm tarball
        run: npm pack

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: sshx-package
          path: "*.tgz"

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: sshx-package
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/*.tgz
            install.sh
            install.ps1
          generate_release_notes: true

  publish-npm:
    needs: release
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/sshx-v')

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.10

      - name: Install dependencies
        run: bun install

      - name: Publish npm package
        env:
          NPM_CONFIG_TOKEN: ${{ secrets.NPM_TOKEN }}
        shell: bash
        run: |
          if [ -z "${NPM_CONFIG_TOKEN:-}" ]; then
            echo "NPM_TOKEN is not configured; skipping npm publish."
            exit 0
          fi

          bun publish
