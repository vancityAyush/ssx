name: Create Release with Binary and Notes

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g. v2.1.0)'
        required: true
        type: string
      prerelease:
        description: 'Mark as pre-release'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

jobs:
  create-tag:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create and push tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "${{ github.event.inputs.version }}"
          git push origin "${{ github.event.inputs.version }}"

  release:
    needs: [create-tag]
    if: always() && (needs.create-tag.result == 'success' || needs.create-tag.result == 'skipped')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Resolve tag name
      id: tag
      run: |
        if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
          echo "name=${{ github.event.inputs.version }}" >> "$GITHUB_OUTPUT"
        else
          echo "name=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
        fi

    - name: Checkout code
      uses: actions/checkout@v4
      with:
        ref: ${{ steps.tag.outputs.name }}

    - name: Prepare binary asset
      run: |
        chmod +x ssh.sh
        mkdir -p release
        cp ssh.sh release/ssh-key-generator.sh

    - name: Generate release notes
      run: |
        cat > release_notes.md << 'EOF'
        # SSH Key Generator Script

        This release contains the SSH key generation script that automates the process of creating and configuring SSH keys for Bitbucket, GitHub, GitLab, or Azure DevOps.

        ## Quick Usage

        Run the script directly without downloading:
        ```bash
        curl -sSL https://raw.githubusercontent.com/${{ github.repository }}/main/ssh.sh | bash
        ```

        Or download and run locally:
        ```bash
        curl -O https://raw.githubusercontent.com/${{ github.repository }}/main/ssh.sh
        chmod +x ssh.sh
        ./ssh.sh
        ```

        ## What's Included

        - **ssh-key-generator.sh**: The main script that helps you generate SSH keys for different platforms

        ## Features

        - Interactive menu to choose between Bitbucket, GitHub, GitLab, and Azure DevOps
        - Automatic SSH key generation with appropriate algorithms for each platform
          - GitHub / Bitbucket: Ed25519 keys
          - GitLab / Azure DevOps: RSA-4096 keys
        - SSH agent configuration
        - SSH config file management
        - Public key clipboard copying (when supported)
        - Cross-platform browser opening to platform SSH settings pages
        - SSH connection testing

        ## Platform Support

        | Platform | SSH Agent | Clipboard | Browser Opening |
        |----------|-----------|-----------|----------------|
        | macOS    | ✅        | pbcopy    | open           |
        | Linux    | ✅        | xclip / xsel | xdg-open    |
        | Windows  | ✅        | clip.exe  | start          |
        | WSL      | ✅        | clip.exe / xclip | xdg-open |

        ## Requirements

        - Bash shell
        - SSH client utilities
        - Internet connection for key testing
        EOF

        echo "Generated release notes:"
        cat release_notes.md

    - name: Upload Release Assets
      uses: softprops/action-gh-release@v1
      with:
        tag_name: ${{ steps.tag.outputs.name }}
        files: |
          release/ssh-key-generator.sh
          ssh.sh
        body_path: release_notes.md
        name: "SSH Key Generator ${{ steps.tag.outputs.name }}"
        draft: false
        prerelease: ${{ github.event.inputs.prerelease == 'true' || false }}
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
