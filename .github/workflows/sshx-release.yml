name: sshx Release

on:
  push:
    tags:
      - "sshx-v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            artifact: sshx-linux-x86_64
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            artifact: sshx-linux-aarch64
          - target: x86_64-apple-darwin
            os: macos-latest
            artifact: sshx-darwin-x86_64
          - target: aarch64-apple-darwin
            os: macos-latest
            artifact: sshx-darwin-aarch64
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            artifact: sshx-windows-x86_64.exe

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Verify Cargo version matches tag
        if: startsWith(github.ref, 'refs/tags/sshx-v')
        shell: bash
        run: |
          expected="${GITHUB_REF_NAME#sshx-v}"
          actual="$(sed -n 's/^version = "\(.*\)"/\1/p' Cargo.toml | head -n 1)"
          test "$expected" = "$actual"

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-compilation tools (Linux aarch64)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc

      - name: Rename binary (Unix)
        if: runner.os != 'Windows'
        run: cp target/${{ matrix.target }}/release/sshx ${{ matrix.artifact }}

      - name: Rename binary (Windows)
        if: runner.os == 'Windows'
        run: cp target/${{ matrix.target }}/release/sshx.exe ${{ matrix.artifact }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/*
            install.sh
            install.ps1
          generate_release_notes: true

  publish-npm:
    needs: release
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/sshx-v')

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.10

      - name: Sync npm package version to release tag
        shell: bash
        run: |
          export SSHX_VERSION="${GITHUB_REF_NAME#sshx-v}"
          bun -e '
          const fs = require('fs');
          const path = 'npm/package.json';
          const pkg = JSON.parse(fs.readFileSync(path, 'utf8'));
          pkg.version = process.env.SSHX_VERSION;
          fs.writeFileSync(path, JSON.stringify(pkg, null, 2) + '\n');
          '

      - name: Install npm package dependencies with Bun
        working-directory: npm
        run: bun install

      - name: Publish npm package with Bun
        working-directory: npm
        env:
          NPM_CONFIG_TOKEN: ${{ secrets.NPM_TOKEN }}
        shell: bash
        run: |
          if [ -z "${NPM_CONFIG_TOKEN:-}" ]; then
            echo "NPM_TOKEN is not configured; skipping npm publish."
            exit 0
          fi

          bun publish
